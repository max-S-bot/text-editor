<!DOCTYPE html>

<html>
<head>
    <title>Text Editor</title>
    <script> 
        if (window.electronFetch) fetch = async (path, options) => 
            new Response(...await electronFetch(path, options));
    </script>
    <link href="/frontend/styles.css" rel="stylesheet"/>
</head>
<body>
    <div id="left">
        <h3 id="dirName"></h3>
        <input id="showDotFiles" type="checkbox"/>
        <label for="showDotFiles">show dot files</label>
        <div id="dir"></div>
    </div>
    <div id="right">
        <div id="file" wrap="off"></div>
        <div id="term">
            <pre id="out"></pre>
            <textarea id="in"></textarea>
        </div>
    </div>
    <script src="/frontend/bundle.js"></script>
</body>
</html>
